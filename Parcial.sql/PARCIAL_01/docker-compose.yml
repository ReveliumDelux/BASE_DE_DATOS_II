version: '3.8'

services:
  # Servicio MySQL para la base de datos
  mysql-db:
    image: mysql:8.0
    container_name: parcial-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: password123
      MYSQL_INITDB_SKIP_TZINFO: 'yes'
    ports:
      - "3306:3306"
    volumes:
      # Persistencia de datos
      - mysql-data:/var/lib/mysql
      # Scripts de inicialización
      # - ./Caso_1_Sistema_Empresarial:/docker-entrypoint-initdb.d
    networks:
      - parcial-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s

  # (Opcional) Servicio phpMyAdmin para gestión visual
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: parcial-phpmyadmin
    environment:
      PMA_HOST: mysql-db
      PMA_USER: root
      PMA_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - mysql-db
    networks:
      - parcial-network

volumes:
  mysql-data:
    driver: local

networks:
  parcial-network:
    driver: bridge
